<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>My Portfolio</title>
</head>
<body>
    <header>
        <a href="#" class="logo">Kit</a>
        <nav>
            <div class="nav-links">
                <a href="#" onclick="closeMenu()" class="active">Home</a>
                <a href="#my-info" onclick="closeMenu()">About</a>
                <a href="#project" onclick="closeMenu()">Project</a>
                <a href="#contact" onclick="closeMenu()">Contact</a>
            </div>
            <!-- Menu Icon for Mobile View -->
            <div class="menu-icon" onclick="toggleMenu()">
                <i class="fas fa-bars"></i>
            </div>
        </nav>
    </header>

    <section class="home">
        <div class="home-img">
            <img src="id.jpg" alt="">
        </div>
        <div class="home-content">
            <h2>Hello, I'm</h2>
            <h1>Keith Andrei</h1>
            <h3 class="p-content">IT Student</h3>
            <div class="social-icons">
            
                <a href="https://github.com/kitciruelas" target="_blank" class="social-icon">
                    <i class="fab fa-github"></i>
                </a>
                <a href="https://www.linkedin.com/in/yourusername" target="_blank" class="social-icon">
                    <i class="fab fa-linkedin"></i>
                </a>
                <a href="https://www.instagram.com/yourusername" target="_blank" class="social-icon">
                    <i class="fab fa-instagram"></i>
                </a>
            </div>
        </div>
    </section>

    <!-- New Section for My Info -->
    <section class="my-info" id="my-info"> 
        <h2>About</h2>
        <p>This section will contain information about me.</p>
    </section>

    <section id="project" id="project">
        <h2>Project</h2>
        <p>Details about my Project.</p>
    </section>

    <section id="contact" id="contact">
        <h2>Contact Me</h2>
        <p>How to contact me.</p>
    </section>

    <script>
        function toggleMenu() {
            const nav = document.querySelector('nav');
            nav.classList.toggle('active');
        }

        function closeMenu() {
            const nav = document.querySelector('nav');
            nav.classList.remove('active'); // Close the menu
        }
    </script>
    
    
</body>
</html>
